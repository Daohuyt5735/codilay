<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodiLay</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Dynamic Syntax Highlighting Theme -->
  <link id="hljs-theme" rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script>
    // Prevent Flash of Unstyled Content (FOUC) by setting theme immediately
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('hljs-theme').href = `https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github${theme === 'light' ? '' : '-dark'}.min.css`;
    })();
  </script>

  <style>
    :root {
      /* DEFAULT: Dark Mode Palette */
      --bg: #09090b;
      --bg-secondary: #18181b;
      --bg-tertiary: #27272a;
      --bg-hover: #3f3f46;
      --border: #27272a;
      --border-focus: #3f3f46;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;

      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-dim: rgba(59, 130, 246, 0.1);

      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #a855f7;

      --sidebar-w: 280px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    /* LIGHT MODE overrides */
    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #f4f4f5;
      --bg-tertiary: #e4e4e7;
      --bg-hover: #d4d4d8;
      --border: #e4e4e7;
      --border-focus: #a1a1aa;
      --text: #09090b;
      --text-muted: #52525b;

      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-dim: rgba(37, 99, 235, 0.1);

      --green: #16a34a;
      --orange: #d97706;
      --red: #dc2626;
      --purple: #9333ea;

      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.2s, color 0.2s;
    }

    .lucide {
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
    }

    /* ── Layout ──────────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
    }

    .sidebar-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-action-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .header-action-btn:hover {
      color: var(--text);
      background: var(--bg-tertiary);
    }

    .sidebar-header .project-name {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .sidebar-search {
      padding: 0 16px 16px;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-wrapper .lucide-search {
      position: absolute;
      left: 10px;
      color: var(--text-muted);
      width: 14px;
      height: 14px;
    }

    .sidebar-search input {
      width: 100%;
      padding: 8px 10px 8px 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .sidebar-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .sidebar-stats {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: var(--bg);
    }

    .stat {
      font-size: 11px;
      color: var(--text-muted);
    }

    .stat strong {
      color: var(--text);
      font-weight: 600;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .sidebar-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .sidebar-tab:hover {
      color: var(--text);
    }

    .sidebar-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }

    .sidebar-nav::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-nav::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 4px;
    }

    .nav-item {
      padding: 8px 12px;
      margin-bottom: 2px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--bg-tertiary);
    }

    .nav-item.active {
      color: var(--accent);
      background: var(--accent-dim);
      font-weight: 500;
    }

    .nav-item .file-ref {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
      margin-top: 3px;
    }

    /* ── Main Content ────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .main-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      background: var(--bg);
      transition: background-color 0.2s, border-color 0.2s;
    }

    .view-tabs {
      display: flex;
      gap: 8px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .view-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view-tab:hover {
      color: var(--text);
    }

    .view-tab.active {
      color: var(--text);
      background: var(--bg);
      box-shadow: var(--shadow-sm);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: var(--bg);
    }

    .main-content::-webkit-scrollbar {
      width: 8px;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 4px;
    }

    /* ── Markdown rendering ──────────────────────────── */
    .doc-content h1 {
      font-size: 26px;
      margin: 0 0 12px;
      color: var(--text);
      font-weight: 600;
    }

    .doc-content h2 {
      font-size: 20px;
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
    }

    .doc-content h3 {
      font-size: 16px;
      margin: 24px 0 12px;
      color: var(--text);
      font-weight: 600;
    }

    .doc-content p {
      margin: 12px 0;
      line-height: 1.6;
      color: var(--text-muted);
      font-size: 14px;
    }

    .doc-content ul,
    .doc-content ol {
      margin: 12px 0 12px 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .doc-content li {
      margin: 6px 0;
      line-height: 1.5;
    }

    .doc-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .doc-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 16px 0;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-radius: 0 6px 6px 0;
      font-style: italic;
    }

    .doc-content code {
      background: var(--bg-secondary);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .doc-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .doc-content pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--text);
      font-size: 13px;
    }

    /* ── Section card ─────────────────────────────── */
    .section-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .section-card h2 {
      margin-top: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    /* ── Chat panel ──────────────────────────────────── */
    .chat-panel {
      width: 440px;
      min-width: 440px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: opacity 0.2s;
    }

    .chat-resizer {
      width: 4px;
      height: 100%;
      position: absolute;
      left: -2px;
      top: 0;
      cursor: col-resize;
      z-index: 100;
      transition: background 0.2s;
    }

    .chat-resizer:hover,
    .chat-resizer.active {
      background: var(--accent);
    }

    .chat-panel.collapsed {
      width: 0;
      min-width: 0;
      overflow: hidden;
      border-left: none;
      opacity: 0;
    }

    /* ── Chat toolbar ────────────────────────────────── */
    .chat-toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-secondary);
    }

    .chat-toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .chat-toolbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-new-btn {
      padding: 6px 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chat-new-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-focus);
    }

    .chat-conv-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .chat-icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-icon-btn:hover {
      color: var(--text);
      background: var(--bg-tertiary);
    }

    /* ── Conversation list dropdown ──────────────────── */
    .chat-conv-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: var(--shadow-lg);
      display: none;
    }

    .chat-conv-dropdown.open {
      display: block;
    }

    .chat-conv-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .chat-conv-item:hover {
      background: var(--bg-tertiary);
    }

    .chat-conv-item:last-child {
      border-bottom: none;
    }

    .chat-conv-item-title {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    .chat-conv-item-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      gap: 8px;
    }

    /* ── Chat toggle ─────────────────────────────────── */
    .chat-toggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: var(--shadow-lg);
      transition: all 0.2s;
    }

    .chat-toggle .lucide {
      width: 24px;
      height: 24px;
    }

    .chat-toggle:hover {
      transform: translateY(-2px);
      background: var(--accent-hover);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
    }

    .chat-toggle.hidden {
      display: none;
    }

    /* ── Messages area ───────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg);
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 4px;
    }

    /* ── Message bubbles ─────────────────────────────── */
    .chat-msg {
      max-width: 90%;
      font-size: 13px;
      line-height: 1.6;
      animation: msgSlideIn 0.2s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes msgSlideIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-msg.user {
      align-self: flex-end;
    }

    .chat-msg.user .msg-bubble {
      background: var(--bg-tertiary);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px 12px 4px 12px;
      border: 1px solid var(--border);
    }

    .chat-msg.bot {
      align-self: flex-start;
    }

    .chat-msg.bot .msg-label {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-msg.bot .msg-label .lucide {
      color: var(--accent);
    }

    .chat-msg.bot .msg-bubble {
      background: transparent;
      color: var(--text);
    }

    /* ── Message formatting ──────────────────── */
    .msg-content p {
      margin: 8px 0;
    }

    .msg-content p:first-child {
      margin-top: 0;
    }

    .msg-content p:last-child {
      margin-bottom: 0;
    }

    .msg-content code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .msg-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      position: relative;
    }

    .msg-content pre::before {
      content: attr(data-lang);
      position: absolute;
      top: 0;
      right: 12px;
      padding: 4px 8px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      border-radius: 0 0 4px 4px;
      text-transform: uppercase;
      font-weight: 600;
      border: 1px solid var(--border);
      border-top: none;
    }

    .code-copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s;
    }

    .msg-content pre:hover .code-copy-btn {
      opacity: 1;
    }

    .code-copy-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .msg-content pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--text);
    }

    .msg-content ul,
    .msg-content ol {
      margin: 8px 0 8px 20px;
    }

    .msg-content li {
      margin: 4px 0;
    }

    .msg-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .msg-content a:hover {
      text-decoration: underline;
    }

    /* ── Message meta ──────────────── */
    .msg-meta {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .msg-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    .msg-badge.deep {
      background: rgba(168, 85, 247, 0.1);
      color: var(--purple);
      border: 1px solid rgba(168, 85, 247, 0.2);
    }

    .msg-badge.source {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }

    .msg-badge.source:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    /* ── Message actions ─────────────────────────────── */
    .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .chat-msg.bot:hover .msg-actions {
      opacity: 1;
    }

    .msg-action-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }

    .msg-action-btn:hover {
      color: var(--text);
      background: var(--bg-tertiary);
      border-color: var(--border-focus);
    }

    /* ── Typing indicator ────────────────────────────── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingBounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    /* ── Input area ──────────────────────────────────── */
    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .chat-input-wrapper {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .chat-input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .chat-input-wrapper textarea {
      width: 100%;
      padding: 12px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
    }

    .chat-input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .chat-input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .chat-input-left {
      display: flex;
      gap: 6px;
    }

    .chat-input-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-mode-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      transition: all 0.15s;
    }

    .chat-mode-btn:hover {
      color: var(--text);
      background: var(--bg-tertiary);
    }

    .chat-mode-btn.active {
      color: var(--purple);
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.2);
    }

    .chat-send-btn {
      padding: 6px 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-send-btn:hover {
      background: var(--accent-hover);
    }

    .chat-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Memory indicator ────────────────────────────── */
    .chat-memory-bar {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
    }

    .chat-memory-bar .mem-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
    }

    /* ── Welcome message ─────────────────────────────── */
    .welcome-msg {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .welcome-msg .welcome-icon {
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-tertiary);
      color: var(--text);
    }

    .welcome-msg .welcome-icon .lucide {
      width: 24px;
      height: 24px;
    }

    .welcome-msg strong {
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    .welcome-suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 24px;
    }

    .welcome-suggestion {
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .welcome-suggestion:hover {
      border-color: var(--border-focus);
      background: var(--bg-hover);
    }

    .welcome-suggestion .lucide {
      color: var(--text-muted);
    }

    /* ── Loading states ──────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── File viewer overlay ─────────────────────────── */
    .file-viewer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(2px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .file-viewer-overlay.hidden {
      display: none;
    }

    .file-viewer {
      width: 100%;
      max-width: 900px;
      max-height: 85vh;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .file-viewer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .file-viewer-header h3 {
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      font-weight: 500;
    }

    .file-viewer-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .file-viewer-close:hover {
      background: var(--bg-tertiary);
      color: var(--text);
    }

    .file-viewer-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .file-viewer-content pre {
      flex: 1;
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
    }

    .file-viewer-content pre code.hljs {
      background: transparent;
      padding: 0;
    }

    /* ── Tools panel ─────────────────────────────────── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .tool-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      transition: all 0.15s;
    }

    .tool-card:hover {
      border-color: var(--border-focus);
      box-shadow: var(--shadow-md);
    }

    .tool-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .tool-card-header .tool-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .tool-card-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .tool-card p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .tool-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }

    .tool-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-focus);
    }

    .tool-btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tool-btn.primary:hover {
      background: var(--accent-hover);
    }

    /* ── Search results ──────────────────────────────── */
    .search-panel {
      max-width: 800px;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .search-result {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .search-result:hover {
      border-color: var(--border-focus);
      background: var(--bg-tertiary);
    }

    .search-result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .search-result-conv {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
    }

    .search-result-meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
    }

    .search-result-content {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .search-result-content mark {
      background: rgba(59, 130, 246, 0.2);
      color: var(--text);
      padding: 1px 3px;
      border-radius: 2px;
    }

    .search-score {
      font-size: 10px;
      padding: 2px 6px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      color: var(--text-muted);
    }

    /* ── Doc diff view ───────────────────────────────── */
    .diff-container {
      max-width: 800px;
    }

    .diff-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .diff-select {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .diff-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .diff-section-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .diff-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .diff-badge.added {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .diff-badge.removed {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    .diff-badge.modified {
      background: rgba(245, 158, 11, 0.15);
      color: var(--orange);
    }

    .diff-section-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .diff-section-body {
      padding: 16px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .diff-line-added {
      background: rgba(34, 197, 94, 0.08);
      color: var(--green);
      padding: 2px 4px;
      display: block;
    }

    .diff-line-removed {
      background: rgba(239, 68, 68, 0.08);
      color: var(--red);
      padding: 2px 4px;
      display: block;
      text-decoration: line-through;
    }

    /* ── Team memory view ────────────────────────────── */
    .team-container {
      max-width: 800px;
    }

    .team-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .team-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .team-tab:hover {
      color: var(--text);
    }

    .team-tab.active {
      color: var(--text);
      background: var(--bg);
      box-shadow: var(--shadow-sm);
    }

    .team-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .team-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .team-item-content {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }

    .team-item-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .vote-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .vote-btn:hover {
      color: var(--green);
      border-color: var(--green);
    }

    /* ── Graph filter bar ────────────────────────────── */
    .graph-filter-bar {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
      max-width: 260px;
    }

    .graph-filter-bar label {
      color: var(--text-muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .graph-filter-bar select {
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    /* ── Triage feedback ─────────────────────────────── */
    .triage-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .triage-item-file {
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
    }

    .triage-item-action {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .triage-item-action.include {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .triage-item-action.exclude {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    .triage-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .triage-delete-btn:hover {
      color: var(--red);
      background: rgba(239, 68, 68, 0.1);
    }

    /* ── Empty state ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 13px;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <div>
            <h1><i data-lucide="layers"></i> CodiLay</h1>
            <div class="project-name" id="project-name">Loading...</div>
          </div>
          <button class="header-action-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
            <i data-lucide="sun" id="theme-icon"></i>
          </button>
        </div>
      </div>

      <div class="sidebar-search">
        <div class="search-wrapper">
          <i data-lucide="search"></i>
          <input type="text" id="section-search" placeholder="Search sections...">
        </div>
      </div>

      <div class="sidebar-stats" id="sidebar-stats"></div>

      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="sections">Sections</div>
        <div class="sidebar-tab" data-tab="files">Files</div>
      </div>

      <div class="sidebar-nav" id="sidebar-nav"></div>
    </div>

    <!-- Main content -->
    <div class="main">
      <div class="main-header">
        <div class="view-tabs">
          <button class="view-tab active" data-view="document"><i data-lucide="file-text"></i> Document</button>
          <button class="view-tab" data-view="graph"><i data-lucide="network"></i> Graph</button>
          <button class="view-tab" data-view="diff"><i data-lucide="git-compare"></i> Doc Diff</button>
          <button class="view-tab" data-view="search"><i data-lucide="search"></i> Search</button>
          <button class="view-tab" data-view="team"><i data-lucide="users"></i> Team</button>
          <button class="view-tab" data-view="tools"><i data-lucide="wrench"></i> Tools</button>
        </div>
      </div>
      <div class="main-content" id="main-content">
        <div class="loading">
          <div class="spinner"></div> Loading documentation...
        </div>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chat-panel">
      <!-- Resize Handle -->
      <div class="chat-resizer" id="chat-resizer"></div>

      <!-- Toolbar -->
      <div class="chat-toolbar" style="position:relative;">
        <div class="chat-toolbar-left">
          <button class="chat-new-btn" onclick="chatNewConversation()" title="New conversation">
            <i data-lucide="plus"></i> New
          </button>
          <span class="chat-conv-title" id="chat-conv-title">New conversation</span>
        </div>
        <div class="chat-toolbar-right">
          <button class="chat-icon-btn" onclick="chatToggleHistory()" title="Conversation history"><i
              data-lucide="history"></i></button>
          <button class="chat-icon-btn" onclick="chatExport()" title="Export to markdown"><i
              data-lucide="download"></i></button>
          <button class="chat-icon-btn" onclick="toggleChat()" title="Close chat"><i data-lucide="x"></i></button>
        </div>
        <!-- Conversation history dropdown -->
        <div class="chat-conv-dropdown" id="chat-conv-dropdown"></div>
      </div>

      <!-- Memory bar -->
      <div class="chat-memory-bar" id="chat-memory-bar" style="display:none;">
        <span class="mem-dot"></span>
        <span id="chat-memory-text">Memory active</span>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages">
        <!-- Rendered by JS initially -->
      </div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <textarea id="chat-input" placeholder="Ask about the codebase..." rows="1" autocomplete="off"></textarea>
          <div class="chat-input-actions">
            <div class="chat-input-left">
              <button class="chat-mode-btn" id="deep-mode-btn" onclick="chatToggleDeep()"
                title="Deep mode — read source files directly">
                <i data-lucide="search"></i> Deep
              </button>
              <button class="chat-mode-btn" onclick="chatShowMemory()" title="View stored memory">
                <i data-lucide="brain"></i> Memory
              </button>
            </div>
            <div class="chat-input-right">
              <span style="font-size:11px;color:var(--text-muted);opacity:0.6;">Enter to send</span>
              <button class="chat-send-btn" id="chat-send" onclick="sendChat()">
                Send <i data-lucide="send" style="width: 14px; height: 14px;"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat toggle button (when panel is collapsed) -->
  <button class="chat-toggle hidden" id="chat-toggle" onclick="toggleChat()" title="Open codebase chat">
    <i data-lucide="message-square"></i>
  </button>

  <!-- File viewer overlay -->
  <div class="file-viewer-overlay hidden" id="file-viewer-overlay" onclick="closeFileViewer(event)">
    <div class="file-viewer">
      <div class="file-viewer-header">
        <h3 id="file-viewer-title"></h3>
        <button class="file-viewer-close" onclick="closeFileViewer()"><i data-lucide="x"></i></button>
      </div>
      <div class="file-viewer-content">
        <pre><code id="file-viewer-code"></code></pre>
      </div>
    </div>
  </div>

  <script>
    // ── Theme Management ─────────────────────────────────────────────────────────
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';

      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);

      // Update hljs stylesheet
      document.getElementById('hljs-theme').href = `https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github${newTheme === 'light' ? '' : '-dark'}.min.css`;

      updateThemeIcon();
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme');
      const iconEl = document.getElementById('theme-icon');
      if (iconEl) {
        // Switch between sun/moon icon based on theme
        iconEl.setAttribute('data-lucide', theme === 'light' ? 'moon' : 'sun');
        if (window.lucide) lucide.createIcons({ nameAttr: 'data-lucide', attrs: { class: "lucide" } });
      }
    }

    // ── Icons Helper ─────────────────────────────────────────────────────────────
    function updateIcons() {
      if (window.lucide) {
        lucide.createIcons();
      }
    }

    // ── State ────────────────────────────────────────────────────────────────────
    let sections = [];
    let links = {};
    let currentView = 'document';
    let currentTab = 'sections';
    let chatOpen = true;

    // ── Init ─────────────────────────────────────────────────────────────────────
    async function init() {
      updateThemeIcon(); // Setup correct icon on load
      chatNewConversation();

      try {
        const [sectionsRes, linksRes, statsRes] = await Promise.all([
          fetch('/api/sections').then(r => r.json()).catch(() => ({ sections: [] })),
          fetch('/api/links').then(r => r.json()).catch(() => ({})),
          fetch('/api/stats').then(r => r.json()).catch(() => ({ project: 'Project Name', files_processed: 0, sections: 0, closed_wires: 0 })),
        ]);

        sections = sectionsRes.sections || [];
        links = linksRes || {};

        document.getElementById('project-name').textContent = statsRes.project || 'Project Data';
        document.title = `CodiLay - ${statsRes.project || 'Dashboard'}`;

        renderStats(statsRes);
        renderSidebar();
        renderDocument();
        updateIcons();
      } catch (err) {
        document.getElementById('main-content').innerHTML =
          `<div class="loading" style="color:var(--red)"><i data-lucide="alert-circle" style="margin-right:8px;"></i> Failed to load: ${err.message}</div>`;
        updateIcons();
      }

    // ── Stats ────────────────────────────────────────────────────────────────────
    function renderStats(stats) {
      const el = document.getElementById('sidebar-stats');
      el.innerHTML = `
        <div class="stat"><strong>${stats.files_processed || 0}</strong> files</div>
        <div class="stat"><strong>${stats.sections || 0}</strong> sections</div>
        <div class="stat"><strong>${stats.closed_wires || 0}</strong> wires</div>
        ${stats.last_commit ? `<div class="stat">@ <strong>${stats.last_commit}</strong></div>` : ''}
      `;
    }

    // ── Sidebar ──────────────────────────────────────────────────────────────────
    function renderSidebar() {
      const nav = document.getElementById('sidebar-nav');
      const search = document.getElementById('section-search').value.toLowerCase();

      if (currentTab === 'sections') {
        const filtered = sections.filter(s =>
          !search || s.title.toLowerCase().includes(search) ||
          (s.file && s.file.toLowerCase().includes(search)) ||
          (s.tags && s.tags.some(t => t.toLowerCase().includes(search)))
        );

        nav.innerHTML = filtered.map(s => `
          <div class="nav-item" data-id="${s.id}" onclick="scrollToSection('${s.id}')">
            ${escHtml(s.title)}
            ${s.file ? `<span class="file-ref">${escHtml(s.file)}</span>` : ''}
          </div>
        `).join('');
      } else {
        const files = new Map();
        sections.forEach(s => {
          if (s.file) {
            if (!files.has(s.file)) files.set(s.file, []);
            files.get(s.file).push(s);
          }
        });

        const entries = [...files.entries()].filter(([f]) =>
          !search || f.toLowerCase().includes(search)
        );

        nav.innerHTML = entries.map(([file, secs]) => `
          <div class="nav-item" onclick="openFile('${escAttr(file)}')">
            ${escHtml(file)}
            <span class="file-ref">${secs.length} section${secs.length > 1 ? 's' : ''}</span>
          </div>
        `).join('');
      }
    }

    // ── Main views ───────────────────────────────────────────────────────────────
    function renderDocument() {
      const container = document.getElementById('main-content');

      if (sections.length === 0) {
        container.innerHTML = '<div class="loading">No sections found.</div>';
        return;
      }

      const html = sections.map(s => `
        <div class="section-card" id="section-${s.id}">
          <div class="doc-content">
            ${renderMarkdown(`## ${s.title}\n${s.file ? `> File: \`${s.file}\`\n\n` : ''}${s.content || ''}`)}
          </div>
        </div>
      `).join('');

      container.innerHTML = html;

      container.querySelectorAll('code').forEach(el => {
        const text = el.textContent;
        if (text.includes('/') && !text.includes(' ') && text.length < 100) {
          el.style.cursor = 'pointer';
          el.style.textDecoration = 'underline';
          el.addEventListener('click', () => openFile(text));

              <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent);"></div> Source file
            </div>
            <div style="display: flex; align-items: center; gap: 6px; margin: 4px 0; color: var(--text-muted);">
              <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--green);"></div> Resolved (closed)
            </div>

    async function loadGraphFilters() {
      try {
        const res = await fetch('/api/graph/filters');
        if (!res.ok) return;
        const data = await res.json();
        const wireTypeSel = document.getElementById('gf-wire-type');
        const layerSel = document.getElementById('gf-layer');
        const moduleSel = document.getElementById('gf-module');
        (data.wire_types || []).forEach(t => {
          wireTypeSel.innerHTML += `<option value="${escHtml(t)}">${escHtml(t)}</option>`;
        });
        (data.layers || []).forEach(l => {
          layerSel.innerHTML += `<option value="${escHtml(l)}">${escHtml(l)}</option>`;
        });
        (data.modules || []).forEach(m => {
          moduleSel.innerHTML += `<option value="${escHtml(m)}">${escHtml(m)}</option>`;
        });
      } catch (e) { /* filters unavailable, no-op */ }
    }

    async function applyGraphFilters() {
      const wireType = document.getElementById('gf-wire-type').value;
      const layer = document.getElementById('gf-layer').value;
      const module = document.getElementById('gf-module').value;
      const minConn = parseInt(document.getElementById('gf-min-conn').value) || 0;

      const body = {
        wire_types: wireType ? [wireType] : null,
        layers: layer ? [layer] : null,
        modules: module ? [module] : null,
        min_connections: minConn,
        direction: 'both',
      };

      try {
        const res = await fetch('/api/graph/filter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) return;
        const data = await res.json();

        // Rebuild graph with filtered data
        const graphContainer = document.getElementById('graph-container');
        const svg = graphContainer.querySelector('svg');
        if (svg) svg.remove();

        const filteredLinks = { closed: [], open: [] };
        (data.edges || []).forEach(e => {
          const wire = { from: e.source, to: e.target, type: e.type };
          if (e.type === 'open') filteredLinks.open.push(wire);
          else filteredLinks.closed.push(wire);
        });

        // Temporarily swap links for buildGraph
        const origLinks = links;
        links = filteredLinks;
        buildGraph();
        links = origLinks;

        // Show filter stats
        const statsEl = document.getElementById('gf-stats');
        if (statsEl && data.stats) {
          statsEl.style.display = 'block';
          statsEl.innerHTML = `Showing ${data.stats.filtered_wires} of ${data.stats.total_wires} wires<br>${data.stats.nodes} nodes`;
        }
      } catch (e) { console.error('Graph filter error:', e); }
    }

    function resetGraphFilters() {
      document.getElementById('gf-wire-type').value = '';
      document.getElementById('gf-layer').value = '';
      document.getElementById('gf-module').value = '';
      document.getElementById('gf-min-conn').value = '0';
      const statsEl = document.getElementById('gf-stats');
      if (statsEl) statsEl.style.display = 'none';
      const svg = document.getElementById('graph-container').querySelector('svg');
      if (svg) svg.remove();
      buildGraph();
    }

    function buildGraph() {
      const container = document.getElementById('graph-container');
      if (!container) return;

      const width = container.clientWidth;
      const height = container.clientHeight || 600;

      const nodeMap = new Map();
      const graphLinks = [];

      function addNode(name, type) {
        if (!nodeMap.has(name)) {
          nodeMap.set(name, { id: name, type, connections: 0 });
        }
        nodeMap.get(name).connections++;
      }

      (links.closed || []).forEach(w => {
        addNode(w.from, 'file');
        addNode(w.to, 'target');
        graphLinks.push({ source: w.from, target: w.to, type: 'closed', wireType: w.type });
      });

      (links.open || []).forEach(w => {
        addNode(w.from, 'file');
        addNode(w.to, 'target');
        graphLinks.push({ source: w.from, target: w.to, type: 'open', wireType: w.type });
      });

      const nodes = [...nodeMap.values()];
      if (nodes.length === 0) {
        container.innerHTML += '<div class="loading">No dependency data to visualize.</div>';
        return;
      }

      const svg = d3.select(container).append('svg')
        .attr('width', width)
        .attr('height', height);

      const g = svg.append('g');
      svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', (e) => {
        g.attr('transform', e.transform);
      }));

      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(graphLinks).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(30));

      const link = g.append('g').selectAll('line')
        .data(graphLinks).enter().append('line')
        .attr('stroke', d => d.type === 'closed' ? 'var(--green)' : 'var(--orange)')
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', d => d.type === 'open' ? '4,3' : 'none')
        .attr('stroke-opacity', 0.5);

      const node = g.append('g').selectAll('g')
        .data(nodes).enter().append('g')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      node.append('circle')
        .attr('r', d => 4 + Math.min(d.connections * 1.5, 8))
        .attr('fill', d => d.type === 'file' ? 'var(--accent)' : 'var(--text-muted)')
        .attr('stroke', 'var(--bg)')
        .attr('stroke-width', 1.5)
        .style('cursor', 'pointer')
        .on('click', (e, d) => {
          const sec = sections.find(s => s.file === d.id || s.id === d.id);
          if (sec) {
            switchView('document');
            setTimeout(() => scrollToSection(sec.id), 100);
          } else {
            openFile(d.id);
          }
        });

      node.append('text')
        .attr('dx', 12)
        .attr('dy', 4)
        .style('font-size', '10px')
        .style('fill', 'var(--text-muted)')
        .style('pointer-events', 'none')
        .text(d => {
          const parts = d.id.split('/');
          return parts[parts.length - 1];
        });

      node.append('title').text(d => d.id);

      sim.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    // ── Doc Diff view ────────────────────────────────────────────────────────────
    let diffSnapshots = [];

    async function renderDiffView() {
      const container = document.getElementById('main-content');
      container.innerHTML = `
        <div style="padding: 32px;" class="diff-container">
          <div class="diff-header">
            <h2 style="font-size:18px;font-weight:600;">Documentation Diff</h2>
            <div style="display:flex;gap:8px;align-items:center;">
              <select class="diff-select" id="diff-snap1"></select>
              <span style="color:var(--text-muted);">vs</span>
              <select class="diff-select" id="diff-snap2"></select>
              <button class="tool-btn primary" onclick="loadDiff()">Compare</button>
            </div>
          </div>
          <div id="diff-results">
            <div class="loading" style="color:var(--text-muted);">Loading snapshots...</div>
          </div>
        </div>
      `;

      try {
        const res = await fetch('/api/doc-diff/snapshots');
        if (!res.ok) throw new Error('Failed to load snapshots');
        const data = await res.json();
        diffSnapshots = data.snapshots || [];

        if (diffSnapshots.length < 2) {
          document.getElementById('diff-results').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i data-lucide="git-compare"></i></div>
              <h3>Not enough snapshots</h3>
              <p>Run CodiLay at least twice to see documentation changes between versions.</p>
              <p style="margin-top:8px;font-size:12px;">Snapshots found: ${diffSnapshots.length}</p>
            </div>`;
          updateIcons();
          return;
        }

        const sel1 = document.getElementById('diff-snap1');
        const sel2 = document.getElementById('diff-snap2');
        diffSnapshots.forEach((s, i) => {
          const label = s.replace(/\.json$/, '');
          sel1.innerHTML += `<option value="${escHtml(s)}" ${i === diffSnapshots.length - 2 ? 'selected' : ''}>${escHtml(label)}</option>`;
          sel2.innerHTML += `<option value="${escHtml(s)}" ${i === diffSnapshots.length - 1 ? 'selected' : ''}>${escHtml(label)}</option>`;
        });

        // Auto-load latest diff
        await loadDiff();
      } catch (e) {
        document.getElementById('diff-results').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i data-lucide="alert-circle"></i></div>
            <h3>Could not load diff</h3>
            <p>${escHtml(e.message)}</p>
          </div>`;
        updateIcons();
      }
    }

    async function loadDiff() {
      const resultsEl = document.getElementById('diff-results');
      resultsEl.innerHTML = '<div class="loading" style="color:var(--text-muted);">Computing diff...</div>';

      try {
        const res = await fetch('/api/doc-diff');
        if (!res.ok) throw new Error('Diff computation failed');
        const data = await res.json();

        if (data.has_changes === false) {
          resultsEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i data-lucide="check-circle"></i></div>
              <h3>No changes detected</h3>
              <p>${data.message || 'The documentation is identical between these snapshots.'}</p>
            </div>`;
          updateIcons();
          return;
        }

        let html = '';

        // Time range
        if (data.old_run_time || data.new_run_time) {
          html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">
            ${data.old_run_time || '?'} &rarr; ${data.new_run_time || '?'}
          </div>`;
        }

        // Stats delta
        if (data.stats_delta) {
          const fd = data.stats_delta.files_processed;
          const sd = data.stats_delta.sections;
          if (fd !== 0 || sd !== 0) {
            html += `<div style="display:flex;gap:16px;margin-bottom:20px;">`;
            if (fd !== 0) html += `<div class="diff-badge ${fd > 0 ? 'added' : 'removed'}">${fd > 0 ? '+' : ''}${fd} files</div>`;
            if (sd !== 0) html += `<div class="diff-badge ${sd > 0 ? 'added' : 'removed'}">${sd > 0 ? '+' : ''}${sd} sections</div>`;
            html += `</div>`;
          }
        }

        // Wire changes
        const wc = data.wire_changes || {};
        if (wc.new_closed || wc.lost_closed || wc.new_open || wc.resolved_open) {
          html += `<div class="diff-section"><div class="diff-section-header">
            <span class="diff-badge modified">wires</span>
            <span class="diff-section-title">Wire Changes</span>
          </div><div class="diff-section-body">`;
          if (wc.new_closed) html += `<span class="diff-line-added">+${wc.new_closed} newly closed wires</span>`;
          if (wc.lost_closed) html += `<span class="diff-line-removed">-${wc.lost_closed} lost closed wires</span>`;
          if (wc.new_open) html += `<span class="diff-line-removed">+${wc.new_open} new open wires</span>`;
          if (wc.resolved_open) html += `<span class="diff-line-added">${wc.resolved_open} open wires resolved</span>`;
          html += `</div></div>`;
        }

        // Added sections
        (data.added_sections || []).forEach(s => {
          html += `<div class="diff-section">
            <div class="diff-section-header">
              <span class="diff-badge added">added</span>
              <span class="diff-section-title">${escHtml(s.title)}</span>
            </div>
            <div class="diff-section-body">${escHtml(s.summary || 'New section added')}</div>
          </div>`;
        });

        // Removed sections
        (data.removed_sections || []).forEach(s => {
          html += `<div class="diff-section">
            <div class="diff-section-header">
              <span class="diff-badge removed">removed</span>
              <span class="diff-section-title">${escHtml(s.title)}</span>
            </div>
          </div>`;
        });

        // Modified sections
        (data.modified_sections || []).forEach(s => {
          html += `<div class="diff-section">
            <div class="diff-section-header">
              <span class="diff-badge modified">modified</span>
              <span class="diff-section-title">${escHtml(s.title)}</span>
            </div>
            <div class="diff-section-body">
              ${s.summary ? `<p style="margin-bottom:8px;">${escHtml(s.summary)}</p>` : ''}
              ${(s.diff || []).map(line => {
                if (line.startsWith('+')) return `<span class="diff-line-added">${escHtml(line)}</span>`;
                if (line.startsWith('-')) return `<span class="diff-line-removed">${escHtml(line)}</span>`;
                return `<span style="display:block;color:var(--text-muted);">${escHtml(line)}</span>`;
              }).join('')}
            </div>
          </div>`;
        });

        if (!html) {
          html = `<div class="empty-state">
            <div class="empty-icon"><i data-lucide="check-circle"></i></div>
            <h3>No changes</h3>
            <p>Documentation is identical between these snapshots.</p>
          </div>`;
        }

        resultsEl.innerHTML = html;
        updateIcons();
      } catch (e) {
        resultsEl.innerHTML = `<div style="color:var(--red);padding:20px;">Error: ${escHtml(e.message)}</div>`;
      }
    }

    // ── Search view ──────────────────────────────────────────────────────────────

            </div>
          </div>

    function handleSearchKeyup(e) {
      if (e.key === 'Enter') {
        runConvSearch();
        return;
      }
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        const q = document.getElementById('conv-search-input').value.trim();
        if (q.length >= 3) runConvSearch();
      }, 500);
    }

    async function runConvSearch() {
      const q = document.getElementById('conv-search-input').value.trim();
      if (!q) return;
      const role = document.getElementById('conv-search-role').value;
      const resultsEl = document.getElementById('conv-search-results');
      const metaEl = document.getElementById('conv-search-meta');
      resultsEl.innerHTML = '<div class="loading" style="color:var(--text-muted);">Searching...</div>';

      try {
        let url = `/api/search?q=${encodeURIComponent(q)}&top_k=30`;
        if (role) url += `&role=${encodeURIComponent(role)}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error('Search failed');
        const data = await res.json();

        metaEl.style.display = 'block';
        metaEl.textContent = `${data.total_results || 0} results across ${data.total_conversations_searched || 0} conversations (${data.total_messages_searched || 0} messages indexed)`;

        if (!data.results || data.results.length === 0) {
          resultsEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i data-lucide="search-x"></i></div>
              <h3>No results</h3>
              <p>No messages matched "${escHtml(q)}". Try different keywords.</p>
            </div>`;
          updateIcons();
          return;
        }

        resultsEl.innerHTML = data.results.map(r => `
          <div class="search-result" onclick="searchResultClick('${escAttr(r.conversation_id)}')">
            <div class="search-result-header">
              <span class="search-result-conv">${escHtml(r.conversation_title || r.conversation_id)}</span>
              <div class="search-result-meta">
                <span style="text-transform:capitalize;">${escHtml(r.role)}</span>
                ${r.created_at ? `<span>${escHtml(r.created_at)}</span>` : ''}
                <span class="search-score">${r.score.toFixed(3)}</span>
              </div>
            </div>
            <div class="search-result-content">${r.snippet || escHtml((r.content || '').slice(0, 200))}</div>
          </div>
        `).join('');

    let lastExportContent = '';

    async function toolExport() {
      const fmt = document.getElementById('export-format').value;
      const preview = document.getElementById('export-preview');
      preview.style.display = 'block';
      preview.textContent = 'Exporting...';

      try {
        const res = await fetch(`/api/export?fmt=${encodeURIComponent(fmt)}`);
        if (!res.ok) throw new Error('Export failed');
        const data = await res.json();
        lastExportContent = data.content || '';
        preview.textContent = lastExportContent.slice(0, 5000) + (lastExportContent.length > 5000 ? '\n\n... (truncated, ' + data.chars + ' chars total)' : '');
      } catch (e) {
        preview.textContent = 'Error: ' + e.message;
      }
    }

    async function toolExportCopy() {
      if (!lastExportContent) await toolExport();
      if (lastExportContent) {
        navigator.clipboard.writeText(lastExportContent).then(() => {
          const btn = document.querySelector('[onclick="toolExportCopy()"]');
          if (btn) { const orig = btn.textContent; btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = orig, 2000); }
        });
      }
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.view === view);
      });
      if (view === 'document') renderDocument();
      else if (view === 'graph') renderGraph();
      else if (view === 'diff') renderDiffView();
      else if (view === 'search') renderSearchView();
      else if (view === 'team') renderTeamView();
      else if (view === 'tools') renderToolsView();
    }

    document.querySelectorAll('.view-tab').forEach(t => {
      t.addEventListener('click', () => switchView(t.dataset.view));
    });
